name: Deploy Frontend to AWS EC2

on:
  push:
    branches: [ main ] # Change to your default branch if different

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build and Push Docker Image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_REPO_NAME: resumeai-frontend
      run: |
        docker build -t $ECR_REGISTRY/$IMAGE_REPO_NAME:latest .
        docker push $ECR_REGISTRY/$IMAGE_REPO_NAME:latest

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd /home/ubuntu/app # Update this path to where your app is on EC2
          # Login to ECR on EC2
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }}
          # Pull latest frontend image
          docker pull ${{ steps.login-ecr.outputs.registry }}/resumeai-frontend:latest
          # Restart frontend service (assuming it's in your docker-compose.yml)
          # If it's not in docker-compose, you can run it manually:
          # docker stop frontend || true
          # docker rm frontend || true
          # docker run -d --name frontend -p 80:80 ${{ steps.login-ecr.outputs.registry }}/resumeai-frontend:latest
          
          # Assuming it IS in docker-compose:
          docker compose up -d frontend
